<svg viewBox="0 0 1400 880" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">

  <rect width="1400" height="880" fill="#ffffff"/>

  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="ap" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="agl" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">The bob ecosystem: a deterministic control plane for stochastic agents</text>
  <text x="700" y="60" text-anchor="middle" font-size="14" font-style="italic" fill="#64748b">vroom closes the loop. everything else is mechanism.</text>

  <!-- Tier labels (right-aligned at x=148, content starts x=180) -->
  <text x="148" y="142" text-anchor="end" font-size="11" font-weight="700" letter-spacing="1.2" fill="#94a3b8">CONTROL</text>
  <text x="148" y="290" text-anchor="end" font-size="11" font-weight="700" letter-spacing="1.2" fill="#94a3b8">AGENTS</text>
  <text x="148" y="430" text-anchor="end" font-size="11" font-weight="700" letter-spacing="1.2" fill="#94a3b8">PATTERNS</text>
  <text x="148" y="570" text-anchor="end" font-size="11" font-weight="700" letter-spacing="1.2" fill="#94a3b8">STATE &amp; EXECUTION</text>
  <text x="148" y="715" text-anchor="end" font-size="11" font-weight="700" letter-spacing="1.2" fill="#94a3b8">EVIDENCE</text>

  <!-- ====== CONTROL: vroom  x=560..840 (280 wide), y=90..190 (100 tall) ====== -->
  <rect x="560" y="90" width="280" height="100" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="700" y="132" text-anchor="middle" font-size="32" font-weight="700" fill="#1e3a8a">vroom</text>
  <text x="700" y="158" text-anchor="middle" font-size="15" fill="#1e40af">recursive controller</text>
  <text x="700" y="180" text-anchor="middle" font-size="13" fill="#3b82f6">diagnose · repair · extend · dispatch</text>

  <!-- Dispatch arrows: vroom -> mcloop / duplo / bob-tools.
       Lines end 2px above each box top edge (y=240 vs box top y=242) so arrowhead sits cleanly outside. -->
  <path d="M 625 190 Q 510 215 320 240" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#ab)"/>
  <path d="M 700 190 L 700 240" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#ab)"/>
  <path d="M 775 190 Q 890 215 1080 240" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#ab)"/>

  <!-- ====== AGENTS  y=242..342 (100 tall), three 240-wide boxes ====== -->
  <rect x="200" y="242" width="240" height="100" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="320" y="280" text-anchor="middle" font-size="24" font-weight="700" fill="#4c1d95">mcloop</text>
  <text x="320" y="305" text-anchor="middle" font-size="14" fill="#5b21b6">autonomous build loop</text>
  <text x="320" y="328" text-anchor="middle" font-size="12" fill="#7c3aed">drives editor agents through tasks</text>

  <rect x="580" y="242" width="240" height="100" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="700" y="280" text-anchor="middle" font-size="24" font-weight="700" fill="#4c1d95">duplo</text>
  <text x="700" y="305" text-anchor="middle" font-size="14" fill="#5b21b6">spec → plan / re-author</text>
  <text x="700" y="328" text-anchor="middle" font-size="12" fill="#7c3aed">writes PLAN.md from sources</text>

  <rect x="960" y="242" width="240" height="100" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="1080" y="280" text-anchor="middle" font-size="24" font-weight="700" fill="#4c1d95">bob-tools</text>
  <text x="1080" y="305" text-anchor="middle" font-size="14" fill="#5b21b6">planfile + ledger library</text>
  <text x="1080" y="328" text-anchor="middle" font-size="12" fill="#7c3aed">deterministic API · the foundation</text>

  <!-- mcloop -> duplo  re-author. Line ends 2px short of duplo left edge (x=578 vs x=580). -->
  <path d="M 442 292 L 578 292" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#ap)"/>
  <text x="510" y="284" text-anchor="middle" font-size="11" font-style="italic" fill="#7c3aed">re-author</text>

  <!-- mcloop -> orchestra (mechanism). Ends 2px above orchestra top (y=383 vs 385). -->
  <path d="M 380 342 L 540 383" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ag)"/>

  <!-- ====== PATTERNS: orchestra  x=460..940 (480), y=385..470 (85 tall) ====== -->
  <rect x="460" y="385" width="480" height="85" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="700" y="418" text-anchor="middle" font-size="24" font-weight="700" fill="#155e75">orchestra</text>
  <text x="700" y="442" text-anchor="middle" font-size="14" fill="#0e7490">multi-model workflows</text>
  <text x="700" y="462" text-anchor="middle" font-size="12" fill="#0891b2">draft-then-adjudicate · council · anonymous reviewers</text>

  <!-- ====== STATE & EXECUTION  y=520..620 (100 tall) ====== -->
  <rect x="200" y="520" width="220" height="100" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="310" y="558" text-anchor="middle" font-size="22" font-weight="700" fill="#78350f">PLAN.md</text>
  <text x="310" y="583" text-anchor="middle" font-size="14" fill="#92400e">canonical plan</text>
  <text x="310" y="605" text-anchor="middle" font-size="12" fill="#b45309">tasks · phases · status</text>

  <rect x="470" y="520" width="220" height="100" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="580" y="558" text-anchor="middle" font-size="22" font-weight="700" fill="#78350f">BUGS.md</text>
  <text x="580" y="583" text-anchor="middle" font-size="14" fill="#92400e">deferred work</text>
  <text x="580" y="605" text-anchor="middle" font-size="12" fill="#b45309">bugs · ideas · followups</text>

  <rect x="740" y="520" width="380" height="100" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="930" y="558" text-anchor="middle" font-size="22" font-weight="700" fill="#78350f">user software execution</text>
  <text x="930" y="583" text-anchor="middle" font-size="14" fill="#92400e">run · test · build · verify</text>
  <text x="930" y="605" text-anchor="middle" font-size="12" fill="#b45309">ground truth</text>

  <!-- Evidence arrows. End 2px above log top (y=668 vs 670). -->
  <path d="M 310 620 L 480 668" stroke="#cbd5e1" stroke-width="1.5" fill="none" marker-end="url(#agl)"/>
  <path d="M 580 620 L 650 668" stroke="#cbd5e1" stroke-width="1.5" fill="none" marker-end="url(#agl)"/>
  <path d="M 930 620 L 820 668" stroke="#cbd5e1" stroke-width="1.5" fill="none" marker-end="url(#agl)"/>

  <!-- ====== EVIDENCE: the everything log  x=380..1020, y=670..745 (75 tall) ====== -->
  <rect x="380" y="670" width="640" height="75" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="700" y="702" text-anchor="middle" font-size="22" font-weight="700" fill="#7c2d12">the everything log</text>
  <text x="700" y="728" text-anchor="middle" font-size="13" fill="#9a3412">every action · every commit · every outcome · tagged to PLAN.md</text>

  <!-- ====== REFLECTION arc: log right (1020,707) up to vroom right (842,140).
       Routes through right margin. Cubic with controls (1340,707) and (1340,140).
       Clearance check at bob-tools bottom y=342: at t≈0.605, x≈1220; bob-tools ends x=1200; clearance 20px.
       Clearance check at user-software bottom y=620: at t≈0.26, x≈1215; user-software ends x=1120; clearance 95px. -->
  <path d="M 1020 707 C 1340 707, 1340 140, 842 140" stroke="#ea580c" stroke-width="3" fill="none" marker-end="url(#ao)"/>
  <text x="1352" y="420" font-size="13" font-style="italic" font-weight="600" fill="#ea580c" transform="rotate(-90 1352 420)" text-anchor="middle">reflection (the loop)</text>

  <!-- ====== LEGEND ====== -->
  <g font-size="12" fill="#475569">
    <line x1="200" y1="845" x2="234" y2="845" stroke="#2563eb" stroke-width="2"/>
    <text x="242" y="849">vroom dispatch</text>

    <line x1="370" y1="845" x2="404" y2="845" stroke="#7c3aed" stroke-width="2"/>
    <text x="412" y="849">re-author call</text>

    <line x1="530" y1="845" x2="564" y2="845" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="572" y="849">mechanism call</text>

    <line x1="700" y1="845" x2="734" y2="845" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="742" y="849">evidence emission</text>

    <line x1="890" y1="845" x2="924" y2="845" stroke="#ea580c" stroke-width="3"/>
    <text x="932" y="849">reflection (the loop)</text>
  </g>

</svg>
