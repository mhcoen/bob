<svg viewBox="0 0 1100 760" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">

  <rect width="1100" height="760" fill="#ffffff"/>

  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="ap" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="atc" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0891b2"/>
    </marker>
    <marker id="agn" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
    <marker id="ask" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="550" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">writer draft view</text>
  <text x="550" y="80" text-anchor="middle" font-size="16" font-style="italic" fill="#64748b">how each section flows through the models</text>

  <!-- writer (top center) -->
  <rect x="385" y="115" width="330" height="100" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="550" y="162" text-anchor="middle" font-size="32" font-weight="700" fill="#1e3a8a">writer</text>
  <text x="550" y="192" text-anchor="middle" font-size="16" fill="#1e40af">per-section drafting loop</text>

  <!-- drafter (middle left) -->
  <rect x="60" y="300" width="280" height="120" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="200" y="345" text-anchor="middle" font-size="30" font-weight="700" fill="#4c1d95">drafter</text>
  <text x="200" y="372" text-anchor="middle" font-size="16" fill="#5b21b6">opus</text>
  <text x="200" y="395" text-anchor="middle" font-size="12" fill="#7c3aed">writes the section</text>
  <text x="200" y="411" text-anchor="middle" font-size="12" fill="#7c3aed">in the author's voice</text>

  <!-- adjudicator (middle center) -->
  <rect x="410" y="300" width="280" height="120" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="550" y="345" text-anchor="middle" font-size="30" font-weight="700" fill="#4c1d95">adjudicator</text>
  <text x="550" y="372" text-anchor="middle" font-size="16" fill="#5b21b6">fable</text>
  <text x="550" y="395" text-anchor="middle" font-size="12" fill="#7c3aed">grounded in the sources?</text>
  <text x="550" y="411" text-anchor="middle" font-size="12" fill="#7c3aed">in voice? no flattery</text>

  <!-- responder (middle right) -->
  <rect x="760" y="300" width="280" height="120" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="900" y="345" text-anchor="middle" font-size="30" font-weight="700" fill="#4c1d95">responder</text>
  <text x="900" y="372" text-anchor="middle" font-size="16" fill="#5b21b6">fable</text>
  <text x="900" y="395" text-anchor="middle" font-size="12" fill="#7c3aed">applies the critique</text>
  <text x="900" y="411" text-anchor="middle" font-size="12" fill="#7c3aed">emits prose only</text>

  <!-- corpus-distance gate (bottom center) -->
  <rect x="410" y="490" width="280" height="110" rx="12" fill="#ecfdf5" stroke="#16a34a" stroke-width="2.5"/>
  <text x="550" y="530" text-anchor="middle" font-size="22" font-weight="700" fill="#14532d">corpus-distance gate</text>
  <text x="550" y="555" text-anchor="middle" font-size="14" fill="#166534">measured against profile.json</text>
  <text x="550" y="578" text-anchor="middle" font-size="12" font-style="italic" fill="#16a34a">the author's fingerprint is the referee</text>

  <!-- draft file (bottom left) -->
  <rect x="60" y="490" width="280" height="110" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
  <text x="200" y="530" text-anchor="middle" font-size="20" font-weight="700" fill="#78350f">bob-paper-draft.md</text>
  <text x="200" y="555" text-anchor="middle" font-size="13" fill="#92400e">assembled · normalized · doclinted</text>
  <text x="200" y="578" text-anchor="middle" font-size="11" font-style="italic" fill="#b45309">document pass loops until clean (&#8804;3)</text>

  <!-- writer -> drafter (section brief, blue) -->
  <path d="M 470 215 L 240 298" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#ab)"/>
  <text x="310" y="252" text-anchor="middle" font-size="14" font-style="italic" fill="#2563eb">section brief</text>

  <!-- drafter -> adjudicator (draft, purple) -->
  <path d="M 342 360 L 408 360" stroke="#7c3aed" stroke-width="3" fill="none" marker-end="url(#ap)"/>
  <text x="375" y="350" text-anchor="middle" font-size="14" font-style="italic" fill="#7c3aed">draft</text>

  <!-- adjudicator -> responder (critique, purple) -->
  <path d="M 692 360 L 758 360" stroke="#7c3aed" stroke-width="3" fill="none" marker-end="url(#ap)"/>
  <text x="725" y="350" text-anchor="middle" font-size="14" font-style="italic" fill="#7c3aed">critique</text>

  <!-- responder -> gate (section prose, cyan) -->
  <path d="M 880 420 L 660 488" stroke="#0891b2" stroke-width="3" fill="none" marker-end="url(#atc)"/>
  <text x="800" y="460" text-anchor="middle" font-size="14" font-style="italic" fill="#0891b2">section prose</text>

  <!-- gate -> draft file (pass, green) -->
  <path d="M 408 545 L 342 545" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#agn)"/>
  <text x="375" y="535" text-anchor="middle" font-size="14" font-style="italic" fill="#16a34a">pass</text>

  <!-- gate -> drafter (gate fail -> revise, orange) -->
  <path d="M 470 488 L 270 424" stroke="#ea580c" stroke-width="3.5" fill="none" marker-end="url(#ao)"/>
  <text x="478" y="472" text-anchor="start" font-size="14" font-style="italic" font-weight="600" fill="#ea580c">revise · style directives (&#8804;2)</text>

  <!-- draft file -> drafter (doc-pass regeneration, dashed slate) -->
  <path d="M 200 488 L 200 424" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#ask)"/>
  <text x="190" y="452" text-anchor="end" font-size="12" font-style="italic" fill="#64748b">doclint &#8594;</text>
  <text x="190" y="468" text-anchor="end" font-size="12" font-style="italic" fill="#64748b">regenerate</text>

  <!-- ====== LEGEND (1 row) ====== -->
  <g font-size="12" fill="#475569">
    <line x1="60" y1="700" x2="94" y2="700" stroke="#2563eb" stroke-width="3"/>
    <text x="102" y="704">section dispatch</text>

    <line x1="230" y1="700" x2="264" y2="700" stroke="#7c3aed" stroke-width="3"/>
    <text x="272" y="704">model handoff</text>

    <line x1="390" y1="700" x2="424" y2="700" stroke="#0891b2" stroke-width="3"/>
    <text x="432" y="704">section prose</text>

    <line x1="550" y1="700" x2="584" y2="700" stroke="#16a34a" stroke-width="3"/>
    <text x="592" y="704">gate pass</text>

    <line x1="690" y1="700" x2="724" y2="700" stroke="#ea580c" stroke-width="3.5"/>
    <text x="732" y="704">gate fail &#8594; revise</text>

    <line x1="870" y1="700" x2="904" y2="700" stroke="#64748b" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="912" y="704">doc-pass regenerate</text>
  </g>

</svg>
