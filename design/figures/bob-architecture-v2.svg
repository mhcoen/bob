<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">

  <!-- ===== Background ===== -->
  <rect width="1400" height="1000" fill="#ffffff"/>

  <!-- ===== Arrowhead markers ===== -->
  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="ap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="agl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="700" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">The bob ecosystem: a deterministic control plane for stochastic agents</text>
  <text x="700" y="68" text-anchor="middle" font-size="14" font-style="italic" fill="#64748b">vroom closes the loop. everything else is mechanism.</text>

  <!-- ===== Tier labels (right-aligned in left gutter, x=20-160) ===== -->
  <text x="150" y="180" text-anchor="end" font-size="11" font-weight="600" letter-spacing="1.2" fill="#94a3b8">CONTROL</text>
  <text x="150" y="370" text-anchor="end" font-size="11" font-weight="600" letter-spacing="1.2" fill="#94a3b8">AGENTS</text>
  <text x="150" y="545" text-anchor="end" font-size="11" font-weight="600" letter-spacing="1.2" fill="#94a3b8">PATTERNS</text>
  <text x="150" y="715" text-anchor="end" font-size="11" font-weight="600" letter-spacing="1.2" fill="#94a3b8">STATE &amp; EXECUTION</text>
  <text x="150" y="880" text-anchor="end" font-size="11" font-weight="600" letter-spacing="1.2" fill="#94a3b8">EVIDENCE</text>

  <!-- ===== CONTROL: vroom (x=500..900, y=120..230) ===== -->
  <rect x="500" y="120" width="400" height="110" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="700" y="160" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">vroom</text>
  <text x="700" y="184" text-anchor="middle" font-size="13" fill="#1e40af">recursive controller</text>
  <text x="700" y="208" text-anchor="middle" font-size="11" fill="#3b82f6">diagnose · repair · extend · dispatch</text>

  <!-- vroom dispatch arrows (blue) -->
  <path d="M 600 230 Q 470 270 340 308" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#ab)"/>
  <path d="M 700 230 L 700 308" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#ab)"/>
  <path d="M 800 230 Q 930 270 1060 308" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#ab)"/>

  <!-- ===== AGENTS row (y=310..420) ===== -->
  <!-- mcloop -->
  <rect x="200" y="310" width="280" height="110" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="340" y="348" text-anchor="middle" font-size="18" font-weight="700" fill="#4c1d95">mcloop</text>
  <text x="340" y="372" text-anchor="middle" font-size="12" fill="#5b21b6">autonomous build loop</text>
  <text x="340" y="395" text-anchor="middle" font-size="11" fill="#7c3aed">drives editor agents through tasks</text>

  <!-- duplo -->
  <rect x="560" y="310" width="280" height="110" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="700" y="348" text-anchor="middle" font-size="18" font-weight="700" fill="#4c1d95">duplo</text>
  <text x="700" y="372" text-anchor="middle" font-size="12" fill="#5b21b6">spec → plan / re-author</text>
  <text x="700" y="395" text-anchor="middle" font-size="11" fill="#7c3aed">writes PLAN.md from sources</text>

  <!-- bob-tools -->
  <rect x="920" y="310" width="280" height="110" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="1060" y="348" text-anchor="middle" font-size="18" font-weight="700" fill="#4c1d95">bob-tools</text>
  <text x="1060" y="372" text-anchor="middle" font-size="12" fill="#5b21b6">planfile + ledger library</text>
  <text x="1060" y="395" text-anchor="middle" font-size="11" fill="#7c3aed">deterministic API · the foundation</text>

  <!-- mcloop -> duplo: re-author (purple) -->
  <path d="M 480 365 L 560 365" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#ap)"/>
  <text x="520" y="356" text-anchor="middle" font-size="11" font-style="italic" fill="#7c3aed">re-author</text>

  <!-- mcloop -> orchestra (grey mechanism) -->
  <path d="M 380 420 L 550 488" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ag)"/>

  <!-- ===== PATTERNS: orchestra (x=400..1000, y=490..590) ===== -->
  <rect x="400" y="490" width="600" height="100" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="700" y="525" text-anchor="middle" font-size="18" font-weight="700" fill="#155e75">orchestra</text>
  <text x="700" y="549" text-anchor="middle" font-size="13" fill="#0e7490">multi-model workflows</text>
  <text x="700" y="572" text-anchor="middle" font-size="11" fill="#0891b2">draft-then-adjudicate · council · anonymous reviewers</text>

  <!-- ===== STATE &amp; EXECUTION (y=650..770) ===== -->
  <!-- PLAN.md -->
  <rect x="200" y="650" width="240" height="120" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="320" y="688" text-anchor="middle" font-size="17" font-weight="700" fill="#78350f">PLAN.md</text>
  <text x="320" y="713" text-anchor="middle" font-size="12" fill="#92400e">canonical plan</text>
  <text x="320" y="736" text-anchor="middle" font-size="11" fill="#b45309">tasks · phases · status</text>

  <!-- BUGS.md -->
  <rect x="480" y="650" width="240" height="120" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="600" y="688" text-anchor="middle" font-size="17" font-weight="700" fill="#78350f">BUGS.md</text>
  <text x="600" y="713" text-anchor="middle" font-size="12" fill="#92400e">deferred work</text>
  <text x="600" y="736" text-anchor="middle" font-size="11" fill="#b45309">bugs · ideas · followups</text>

  <!-- user software execution -->
  <rect x="760" y="650" width="440" height="120" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="980" y="688" text-anchor="middle" font-size="17" font-weight="700" fill="#78350f">user software execution</text>
  <text x="980" y="713" text-anchor="middle" font-size="12" fill="#92400e">run · test · build · verify</text>
  <text x="980" y="736" text-anchor="middle" font-size="11" fill="#b45309">ground truth</text>

  <!-- Evidence arrows: state items -> log (light grey) -->
  <path d="M 320 770 L 480 830" stroke="#cbd5e1" stroke-width="1.5" fill="none" marker-end="url(#agl)"/>
  <path d="M 600 770 L 660 830" stroke="#cbd5e1" stroke-width="1.5" fill="none" marker-end="url(#agl)"/>
  <path d="M 980 770 L 880 830" stroke="#cbd5e1" stroke-width="1.5" fill="none" marker-end="url(#agl)"/>

  <!-- ===== EVIDENCE: the everything log (x=300..1100, y=830..920) ===== -->
  <rect x="300" y="830" width="800" height="90" rx="12" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="700" y="863" text-anchor="middle" font-size="18" font-weight="700" fill="#7c2d12">the everything log</text>
  <text x="700" y="888" text-anchor="middle" font-size="12" fill="#9a3412">every action · every commit · every outcome · tagged to PLAN.md</text>

  <!-- ===== REFLECTION arc: log (1100,875) -> vroom (900,175), routed RIGHT outside.
       Cubic C with controls (1360,875) and (1360,175).
       Verified clearance: at y=420 (bob-tools bottom) x≈1244, bob-tools ends at 1200, clearance ~44px.
                            at y=770 (user-software bottom) x≈1239, clearance ~39px. ===== -->
  <path d="M 1100 875 C 1360 875, 1360 175, 900 175" stroke="#ea580c" stroke-width="3" fill="none" marker-end="url(#ao)"/>
  <text x="1365" y="525" font-size="13" font-style="italic" font-weight="600" fill="#ea580c" transform="rotate(-90 1365 525)" text-anchor="middle">reflection (the loop)</text>

  <!-- ===== LEGEND (bottom strip) ===== -->
  <g font-size="11" fill="#475569">
    <line x1="200" y1="960" x2="232" y2="960" stroke="#2563eb" stroke-width="2"/>
    <text x="240" y="964">vroom dispatch</text>

    <line x1="360" y1="960" x2="392" y2="960" stroke="#7c3aed" stroke-width="2"/>
    <text x="400" y="964">re-author call</text>

    <line x1="510" y1="960" x2="542" y2="960" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="550" y="964">mechanism call</text>

    <line x1="670" y1="960" x2="702" y2="960" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="710" y="964">evidence emission</text>

    <line x1="850" y1="960" x2="882" y2="960" stroke="#ea580c" stroke-width="3"/>
    <text x="890" y="964">reflection (the loop)</text>
  </g>

</svg>
