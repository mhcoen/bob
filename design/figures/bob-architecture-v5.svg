<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">

  <rect width="1600" height="1000" fill="#ffffff"/>

  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="ap" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="agn" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="atc" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0891b2"/>
    </marker>
    <marker id="ask" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="agl" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="800" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">The bob ecosystem: a deterministic control plane for stochastic agents</text>
  <text x="800" y="60" text-anchor="middle" font-size="14" font-style="italic" fill="#64748b">vroom closes the loop. everything else is mechanism.</text>

  <!-- Tier labels -->
  <text x="200" y="140" text-anchor="end" font-size="11" font-weight="700" letter-spacing="1.2" fill="#94a3b8">CONTROL</text>
  <text x="200" y="285" text-anchor="end" font-size="11" font-weight="700" letter-spacing="1.2" fill="#94a3b8">AGENTS</text>
  <text x="200" y="440" text-anchor="end" font-size="11" font-weight="700" letter-spacing="1.2" fill="#94a3b8">PATTERNS / KNOWLEDGE</text>
  <text x="200" y="585" text-anchor="end" font-size="11" font-weight="700" letter-spacing="1.2" fill="#94a3b8">INTERFACE</text>
  <text x="200" y="735" text-anchor="end" font-size="11" font-weight="700" letter-spacing="1.2" fill="#94a3b8">STATE &amp; EXECUTION</text>
  <text x="200" y="880" text-anchor="end" font-size="11" font-weight="700" letter-spacing="1.2" fill="#94a3b8">EVIDENCE</text>

  <!-- ====== CONTROL: vroom ====== -->
  <rect x="700" y="90" width="220" height="90" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="810" y="128" text-anchor="middle" font-size="30" font-weight="700" fill="#1e3a8a">vroom</text>
  <text x="810" y="152" text-anchor="middle" font-size="14" fill="#1e40af">recursive controller</text>
  <text x="810" y="172" text-anchor="middle" font-size="12" fill="#3b82f6">diagnose · repair · extend · dispatch</text>

  <!-- vroom dispatch (blue) -->
  <path d="M 760 180 Q 650 200 340 218" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#ab)"/>
  <path d="M 820 180 L 600 218" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#ab)"/>

  <!-- ====== AGENTS ====== -->
  <rect x="240" y="220" width="200" height="120" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="340" y="262" text-anchor="middle" font-size="24" font-weight="700" fill="#4c1d95">mcloop</text>
  <text x="340" y="288" text-anchor="middle" font-size="13" fill="#5b21b6">autonomous build loop</text>
  <text x="340" y="310" text-anchor="middle" font-size="12" fill="#7c3aed">drives editor agents</text>
  <text x="340" y="328" text-anchor="middle" font-size="12" fill="#7c3aed">controls git commits</text>

  <rect x="500" y="220" width="200" height="120" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="600" y="262" text-anchor="middle" font-size="24" font-weight="700" fill="#4c1d95">duplo</text>
  <text x="600" y="288" text-anchor="middle" font-size="13" fill="#5b21b6">spec → plan / re-author</text>
  <text x="600" y="310" text-anchor="middle" font-size="12" fill="#7c3aed">authors PLAN.md from</text>
  <text x="600" y="328" text-anchor="middle" font-size="12" fill="#7c3aed">sources &amp; knowledge</text>

  <!-- mcloop -> duplo (re-author, purple) -->
  <path d="M 442 280 L 498 280" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#ap)"/>
  <text x="470" y="272" text-anchor="middle" font-size="11" font-style="italic" fill="#7c3aed">re-author</text>

  <!-- mcloop -> orchestra (mechanism, slate). Q from (442, 342) via (700, 350) to (920, 378).
       Clears duplo: at duplo left x=500 y=344 (4px below duplo bottom 340); at duplo right x=700 y=356 (16px below).
       Max y=378, never reaches knowledge top y=380. -->
  <path d="M 442 342 Q 700 350 920 378" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#ask)"/>

  <!-- ====== PATTERNS / KNOWLEDGE ====== -->
  <rect x="460" y="380" width="190" height="110" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="555" y="418" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">learned mistakes</text>
  <text x="555" y="442" text-anchor="middle" font-size="12" fill="#475569">failure patterns</text>
  <text x="555" y="462" text-anchor="middle" font-size="11" fill="#64748b">past errors · regressions</text>
  <text x="555" y="478" text-anchor="middle" font-size="11" fill="#64748b">avoidance heuristics</text>

  <rect x="680" y="380" width="190" height="110" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="775" y="418" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">architecture</text>
  <text x="775" y="438" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">patterns</text>
  <text x="775" y="460" text-anchor="middle" font-size="11" fill="#64748b">Swift · web · mobile · ML</text>
  <text x="775" y="478" text-anchor="middle" font-size="11" fill="#64748b">domain-specific patterns</text>

  <rect x="920" y="380" width="460" height="110" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="1150" y="418" text-anchor="middle" font-size="24" font-weight="700" fill="#155e75">orchestra</text>
  <text x="1150" y="442" text-anchor="middle" font-size="14" fill="#0e7490">multi-model workflows</text>
  <text x="1150" y="464" text-anchor="middle" font-size="12" fill="#0891b2">draft-then-adjudicate · council · anonymous reviewers</text>
  <text x="1150" y="482" text-anchor="middle" font-size="11" font-style="italic" fill="#0891b2">invoked by mcloop · independently usable</text>

  <!-- duplo -> learned mistakes (consult, dashed slate) -->
  <path d="M 555 342 L 555 378" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#ask)"/>
  <!-- duplo -> arch patterns (consult, dashed slate) -->
  <path d="M 660 342 L 750 378" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#ask)"/>

  <!-- mcloop &lt;-&gt; bob-tools (bidirectional green) -->
  <path d="M 310 342 L 310 528" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#agn)"/>
  <path d="M 370 528 L 370 342" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#agn)"/>

  <!-- duplo -> bob-tools (green) -->
  <!-- Q from (520, 342) via (200, 460) to (340, 528). Verified clears knowledge boxes. -->
  <path d="M 520 342 Q 200 460 340 528" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#agn)"/>

  <!-- mcloop -> git (commit, green). Orthogonal: V (left of learned mistakes) - H (in gap between knowledge and bob-tools) - V into git.
       V1 x=400 y=342..510 (left of learned mistakes 460, ends above bob-tools 530).
       H y=510 x=400..820 (in 40px gap between knowledge bottom 490 and bob-tools top 530, right of mcloop-bob verticals 310,370).
       V2 x=820 y=510..668 (inside git x-range 720..920, ends 2px above git top 670). -->
  <path d="M 400 342 V 510 H 820 V 668" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#agn)"/>

  <!-- orchestra -> user software execution (teal) -->
  <path d="M 1100 492 L 1100 668" stroke="#0891b2" stroke-width="2.5" fill="none" marker-end="url(#atc)"/>

  <!-- ====== INTERFACE: bob-tools ====== -->
  <rect x="240" y="530" width="200" height="100" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="340" y="566" text-anchor="middle" font-size="22" font-weight="700" fill="#14532d">bob-tools</text>
  <text x="340" y="590" text-anchor="middle" font-size="12" fill="#166534">planfile + ledger API</text>
  <text x="340" y="608" text-anchor="middle" font-size="11" font-style="italic" fill="#16a34a">sole interface to PLAN.md</text>
  <text x="340" y="623" text-anchor="middle" font-size="11" font-style="italic" fill="#16a34a">deterministic · the foundation</text>

  <!-- bob-tools -> PLAN.md (green, interface) -->
  <path d="M 340 632 L 340 668" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#agn)"/>

  <!-- ====== STATE &amp; EXECUTION ====== -->
  <rect x="240" y="670" width="200" height="120" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="340" y="710" text-anchor="middle" font-size="22" font-weight="700" fill="#78350f">PLAN.md</text>
  <text x="340" y="735" text-anchor="middle" font-size="13" fill="#92400e">canonical plan</text>
  <text x="340" y="755" text-anchor="middle" font-size="11" fill="#b45309">tasks · phases · status</text>
  <text x="340" y="773" text-anchor="middle" font-size="11" fill="#b45309">ledger</text>

  <rect x="480" y="670" width="200" height="120" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="580" y="710" text-anchor="middle" font-size="22" font-weight="700" fill="#78350f">BUGS.md</text>
  <text x="580" y="735" text-anchor="middle" font-size="13" fill="#92400e">deferred work</text>
  <text x="580" y="755" text-anchor="middle" font-size="11" fill="#b45309">bugs · ideas</text>
  <text x="580" y="773" text-anchor="middle" font-size="11" fill="#b45309">followups</text>

  <rect x="720" y="670" width="200" height="120" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="820" y="710" text-anchor="middle" font-size="22" font-weight="700" fill="#78350f">git</text>
  <text x="820" y="735" text-anchor="middle" font-size="13" fill="#92400e">version control</text>
  <text x="820" y="755" text-anchor="middle" font-size="11" fill="#b45309">commits · branches</text>
  <text x="820" y="773" text-anchor="middle" font-size="11" fill="#b45309">history</text>

  <rect x="960" y="670" width="440" height="120" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="1180" y="710" text-anchor="middle" font-size="22" font-weight="700" fill="#78350f">user software execution</text>
  <text x="1180" y="735" text-anchor="middle" font-size="13" fill="#92400e">run · test · build · verify</text>
  <text x="1180" y="755" text-anchor="middle" font-size="11" fill="#b45309">ground truth</text>
  <text x="1180" y="773" text-anchor="middle" font-size="11" font-style="italic" fill="#b45309">the only honest signal</text>

  <!-- user soft -> BUGS.md (green, curves over git) -->
  <!-- Q from (1000, 668) via (790, 590) to (640, 668). Verified clears git by 46px. -->
  <path d="M 1000 668 Q 790 590 640 668" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#agn)"/>

  <!-- Evidence emission (light grey) -->
  <path d="M 340 792 L 480 828" stroke="#cbd5e1" stroke-width="1.5" fill="none" marker-end="url(#agl)"/>
  <path d="M 580 792 L 620 828" stroke="#cbd5e1" stroke-width="1.5" fill="none" marker-end="url(#agl)"/>
  <path d="M 820 792 L 820 828" stroke="#cbd5e1" stroke-width="1.5" fill="none" marker-end="url(#agl)"/>
  <path d="M 1180 792 L 1100 828" stroke="#cbd5e1" stroke-width="1.5" fill="none" marker-end="url(#agl)"/>

  <!-- ====== EVIDENCE: the everything log ====== -->
  <rect x="240" y="830" width="1160" height="90" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="820" y="865" text-anchor="middle" font-size="22" font-weight="700" fill="#7c2d12">the everything log</text>
  <text x="820" y="892" text-anchor="middle" font-size="13" fill="#9a3412">every action · every commit · every outcome · tagged to PLAN.md</text>

  <!-- REFLECTION arc: log right (1400, 875) -> vroom right (920, 135), routed on far right exterior -->
  <!-- Cubic via (1580, 875), (1580, 135). Min x in orchestra y-range: 1419 (clears orchestra right x=1380 by 39px). -->
  <path d="M 1400 875 C 1580 875, 1580 135, 920 135" stroke="#ea580c" stroke-width="3" fill="none" marker-end="url(#ao)"/>
  <text x="1568" y="500" font-size="13" font-style="italic" font-weight="600" fill="#ea580c" transform="rotate(-90 1568 500)" text-anchor="middle">reflection (the loop)</text>

  <!-- ====== LEGEND (2 rows) ====== -->
  <g font-size="12" fill="#475569">
    <!-- Row 1 -->
    <line x1="240" y1="945" x2="274" y2="945" stroke="#2563eb" stroke-width="2"/>
    <text x="282" y="949">vroom dispatch</text>

    <line x1="400" y1="945" x2="434" y2="945" stroke="#7c3aed" stroke-width="2"/>
    <text x="442" y="949">re-author call</text>

    <line x1="550" y1="945" x2="584" y2="945" stroke="#16a34a" stroke-width="2"/>
    <text x="592" y="949">state read / write</text>

    <line x1="730" y1="945" x2="764" y2="945" stroke="#0891b2" stroke-width="2.5"/>
    <text x="772" y="949">execution</text>

    <!-- Row 2 -->
    <line x1="240" y1="975" x2="274" y2="975" stroke="#64748b" stroke-width="1.5"/>
    <text x="282" y="979">mechanism call</text>

    <line x1="400" y1="975" x2="434" y2="975" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="442" y="979">knowledge consult</text>

    <line x1="580" y1="975" x2="614" y2="975" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="622" y="979">evidence emission</text>

    <line x1="760" y1="975" x2="794" y2="975" stroke="#ea580c" stroke-width="3"/>
    <text x="802" y="979">reflection (the loop)</text>
  </g>

</svg>
