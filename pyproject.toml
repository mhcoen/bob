[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
mcloop = { workspace = true }
duplo = { workspace = true }
orchestra = { workspace = true }
bob-tools = { workspace = true }

[tool.pytest.ini_options]
addopts = "-n auto --import-mode=importlib"
timeout = 60
markers = [
    "integration: marks tests as integration tests (deselect with '-m not integration')",
]

[dependency-groups]
dev = [
    "pytest-xdist>=3.5",
    "pytest-timeout>=2.3",
]
