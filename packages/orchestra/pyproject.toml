[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "orchestra"
version = "0.0.1"
description = "Orchestra runner, slice 1"
requires-python = ">=3.12"
readme = "README.md"
license = {file = "LICENSE"}
authors = [{name = "Michael Coen"}]
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.5",
    "mypy>=1.10",
]

[project.scripts]
orchestra = "orchestra.cli:main"

[tool.setuptools.packages.find]
include = ["orchestra*"]

[tool.setuptools.package-data]
orchestra = [
    "workflows/*.orc",
    "workflows/templates/*.md",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
warn_return_any = true
