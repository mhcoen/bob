[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "orchestra"
version = "0.0.1"
description = "Orchestra runner, slice 1"
requires-python = ">=3.12"
readme = "README.md"
license = {file = "LICENSE"}
authors = [{name = "Michael Coen"}]
dependencies = [
    "prompt_toolkit>=3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.5",
    "mypy>=1.10",
    "pytest-xdist>=3.5",
    "pytest-timeout>=2.3",
    "pytest-cov>=4.1",
]

[project.scripts]
orchestra = "orchestra.cli:main"

[tool.setuptools.packages.find]
include = ["orchestra*"]

[tool.setuptools.package-data]
orchestra = [
    "py.typed",
    "workflows/*.orc",
    "workflows/templates/*.md",
]

[tool.pytest.ini_options]
addopts = "-n auto"
timeout = 60
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
warn_return_any = true

# Tests are not held to full strict annotation discipline: unannotated
# test functions and calls between them are conventional and not a
# type-safety concern. Real type checks (arg-type, call-arg, attr-defined,
# etc.) still apply to tests; only the annotation-presence rules are
# relaxed here.
[[tool.mypy.overrides]]
module = [
    "conftest",
    "test_adapters",
    "test_api",
    "test_calibration",
    "test_cli",
    "test_codex_agent_adapter",
    "test_codex_text_adapter",
    "test_config",
    "test_decision_consistency",
    "test_e2e",
    "test_e2e_decision_consistency",
    "test_e2e_determinism",
    "test_executor_json_extractor",
    "test_fan_out_executor",
    "test_loader",
    "test_log",
    "test_parity_code_edit",
    "test_pass8_security",
    "test_payloads",
    "test_progress",
    "test_prompt_snapshot",
    "test_provider_actors",
    "test_registry",
    "test_repl",
    "test_resume",
    "test_schema",
    "test_schema_smoke",
    "test_store",
    "test_subprocess_adapters",
    "test_transforms",
    "test_visibility",
    "test_workflows_ask",
    "test_workflows_ask_anonymous_reviewers",
    "test_workflows_ask_council",
    "test_workflows_council",
    "test_workflows_design_loop",
    "test_workflows_iterate",
    "test_workflows_parallel_thinking",
    "test_workflows_prji",
]
disallow_untyped_defs = false
disallow_untyped_calls = false
disallow_incomplete_defs = false
disable_error_code = ["no-untyped-def", "no-untyped-call", "type-arg"]
