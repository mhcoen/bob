  <line x1="355" y1="361" x2="490" y2="395" stroke="#7b8394" stroke-width="1.1" marker-end="url(#arrow-faint)"/>
  <line x1="540" y1="361" x2="510" y2="395" stroke="#7b8394" stroke-width="1.1" marker-end="url(#arrow-faint)"/>
  <line x1="725" y1="361" x2="525" y2="395" stroke="#7b8394" stroke-width="1.1" marker-end="url(#arrow-faint)"/>
  <line x1="900" y1="361" x2="535" y2="395" stroke="#7b8394" stroke-width="1.1" marker-end="url(#arrow-faint)"/>

  <g>
