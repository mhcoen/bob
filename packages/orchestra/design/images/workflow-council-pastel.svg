    <text x="500" y="450" text-anchor="middle" font-size="12" fill="#4c566a">strips identities, relabels A–E</text>
  </g>

  <line x1="500" y1="466" x2="170" y2="505" stroke="#4c566a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="500" y1="466" x2="355" y2="505" stroke="#4c566a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="500" y1="466" x2="540" y2="505" stroke="#4c566a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="500" y1="466" x2="725" y2="505" stroke="#4c566a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="500" y1="466" x2="900" y2="505" stroke="#4c566a" stroke-width="1.3" marker-end="url(#arrow)"/>

  <g>
    <rect x="80" y="510" width="180" height="66" rx="14" fill="#f0e8d8" stroke="#c8b88c" stroke-width="1.5"/>
    <text x="170" y="537" text-anchor="middle" font-size="15" font-weight="600" fill="#2e3440">Reviewer</text>
    <text x="170" y="560" text-anchor="middle" font-size="11" fill="#4c566a">critiques A</text>
  </g>
  <g>
    <rect x="265" y="510" width="180" height="66" rx="14" fill="#f0e8d8" stroke="#c8b88c" stroke-width="1.5"/>
    <text x="355" y="537" text-anchor="middle" font-size="15" font-weight="600" fill="#2e3440">Reviewer</text>
    <text x="355" y="560" text-anchor="middle" font-size="11" fill="#4c566a">critiques B</text>
  </g>
  <g>
    <rect x="450" y="510" width="180" height="66" rx="14" fill="#f0e8d8" stroke="#c8b88c" stroke-width="1.5"/>
    <text x="540" y="537" text-anchor="middle" font-size="15" font-weight="600" fill="#2e3440">Reviewer</text>
    <text x="540" y="560" text-anchor="middle" font-size="11" fill="#4c566a">critiques C</text>
  </g>
  <g>
    <rect x="635" y="510" width="180" height="66" rx="14" fill="#f0e8d8" stroke="#c8b88c" stroke-width="1.5"/>
    <text x="725" y="537" text-anchor="middle" font-size="15" font-weight="600" fill="#2e3440">Reviewer</text>
    <text x="725" y="560" text-anchor="middle" font-size="11" fill="#4c566a">critiques D</text>
  </g>
  <g>
    <rect x="820" y="510" width="160" height="66" rx="14" fill="#f0e8d8" stroke="#c8b88c" stroke-width="1.5"/>
    <text x="900" y="537" text-anchor="middle" font-size="15" font-weight="600" fill="#2e3440">Reviewer</text>
    <text x="900" y="560" text-anchor="middle" font-size="11" fill="#4c566a">critiques E</text>
  </g>

  <line x1="170" y1="576" x2="475" y2="610" stroke="#7b8394" stroke-width="1.1" marker-end="url(#arrow-faint)"/>
  <line x1="355" y1="576" x2="490" y2="610" stroke="#7b8394" stroke-width="1.1" marker-end="url(#arrow-faint)"/>
  <line x1="540" y1="576" x2="510" y2="610" stroke="#7b8394" stroke-width="1.1" marker-end="url(#arrow-faint)"/>
  <line x1="725" y1="576" x2="525" y2="610" stroke="#7b8394" stroke-width="1.1" marker-end="url(#arrow-faint)"/>
  <line x1="900" y1="576" x2="535" y2="610" stroke="#7b8394" stroke-width="1.1" marker-end="url(#arrow-faint)"/>

  <g>
    <rect x="400" y="615" width="200" height="66" rx="14" fill="#ecd9d6" stroke="#bf8e8e" stroke-width="1.5"/>
    <text x="500" y="643" text-anchor="middle" font-size="16" font-weight="600" fill="#2e3440">Chairman</text>
    <text x="500" y="665" text-anchor="middle" font-size="12" fill="#4c566a">synthesizes the verdict</text>
  </g>

  <line x1="600" y1="648" x2="715" y2="648" stroke="#4c566a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="720" y="615" width="140" height="66" rx="33" fill="#d8e3d4" stroke="#a3be8c" stroke-width="1.5"/>
    <text x="790" y="654" text-anchor="middle" font-size="15" font-weight="600" fill="#2e3440">Answer</text>
  </g>
