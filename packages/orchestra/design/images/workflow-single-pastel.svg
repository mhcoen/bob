<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4c566a"/>
    </marker>
  </defs>

  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="600" fill="#2e3440">Single</text>
  <text x="400" y="60" text-anchor="middle" font-size="13" fill="#4c566a">one model answers</text>

  <g>
    <rect x="40" y="120" width="140" height="66" rx="33" fill="#e5e9f0" stroke="#7b8394" stroke-width="1.5"/>
    <text x="110" y="159" text-anchor="middle" font-size="15" font-weight="600" fill="#2e3440">Input</text>
  </g>

  <line x1="180" y1="153" x2="245" y2="153" stroke="#4c566a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="250" y="120" width="200" height="66" rx="14" fill="#f0e8d8" stroke="#c8b88c" stroke-width="1.5"/>
    <text x="350" y="148" text-anchor="middle" font-size="16" font-weight="600" fill="#2e3440">Responder</text>
    <text x="350" y="170" text-anchor="middle" font-size="12" fill="#4c566a">answers the question</text>
  </g>

  <line x1="450" y1="153" x2="615" y2="153" stroke="#4c566a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="620" y="120" width="140" height="66" rx="33" fill="#d8e3d4" stroke="#a3be8c" stroke-width="1.5"/>
    <text x="690" y="159" text-anchor="middle" font-size="15" font-weight="600" fill="#2e3440">Answer</text>
  </g>
</svg>
