<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 480" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4c566a"/>
    </marker>
    <marker id="arrow-tiny" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7b8394"/>
    </marker>
  </defs>

  <text x="650" y="38" text-anchor="middle" font-size="18" font-weight="600" fill="#2e3440">Iterate Until Acceptable</text>
  <text x="650" y="60" text-anchor="middle" font-size="13" fill="#4c566a">a responder drafts; a judge accepts or sends it back; bounded by a round cap</text>

  <!-- Input -->
  <g>
    <rect x="20" y="280" width="120" height="60" rx="30" fill="#e5e9f0" stroke="#7b8394" stroke-width="1.5"/>
    <text x="80" y="316" text-anchor="middle" font-size="15" font-weight="600" fill="#2e3440">Input</text>
  </g>

  <line x1="140" y1="310" x2="195" y2="310" stroke="#4c566a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Responder slot: dashed container, four mini-workflow rows inside -->
  <!-- Container: x=200, width=480, total inner span 200..680 -->
  <!-- Each row: icons on left (220..380), label on right (390..) -->
  <g>
    <rect x="200" y="200" width="480" height="220" rx="14" fill="#d8e3ee" stroke="#88a4c0" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="440" y="225" text-anchor="middle" font-size="16" font-weight="600" fill="#2e3440">Responder</text>
    <text x="440" y="244" text-anchor="middle" font-size="12" fill="#4c566a">any workflow can go here</text>

    <!-- Mini Single -->
    <g>
      <circle cx="225" cy="278" r="6" fill="#e5e9f0" stroke="#7b8394" stroke-width="1"/>
      <line x1="231" y1="278" x2="245" y2="278" stroke="#7b8394" stroke-width="1" marker-end="url(#arrow-tiny)"/>
      <rect x="250" y="270" width="60" height="16" rx="3" fill="#f0e8d8" stroke="#c8b88c" stroke-width="1"/>
      <line x1="310" y1="278" x2="325" y2="278" stroke="#7b8394" stroke-width="1" marker-end="url(#arrow-tiny)"/>
      <circle cx="335" cy="278" r="6" fill="#d8e3d4" stroke="#a3be8c" stroke-width="1"/>
      <text x="395" y="282" font-size="12" fill="#2e3440">Single</text>
    </g>

    <!-- Mini Draft then Adjudicate -->
    <g>
      <circle cx="225" cy="308" r="6" fill="#e5e9f0" stroke="#7b8394" stroke-width="1"/>
      <line x1="231" y1="308" x2="240" y2="308" stroke="#7b8394" stroke-width="1" marker-end="url(#arrow-tiny)"/>
      <rect x="245" y="300" width="46" height="16" rx="3" fill="#d8e3ee" stroke="#88a4c0" stroke-width="1"/>
      <line x1="291" y1="308" x2="297" y2="308" stroke="#7b8394" stroke-width="1" marker-end="url(#arrow-tiny)"/>
      <rect x="302" y="300" width="46" height="16" rx="3" fill="#ecd9d6" stroke="#bf8e8e" stroke-width="1"/>
      <line x1="348" y1="308" x2="358" y2="308" stroke="#7b8394" stroke-width="1" marker-end="url(#arrow-tiny)"/>
      <circle cx="368" cy="308" r="6" fill="#d8e3d4" stroke="#a3be8c" stroke-width="1"/>
      <text x="395" y="312" font-size="12" fill="#2e3440">Draft then Adjudicate</text>
    </g>

    <!-- Mini Propose-Critique-Synthesize -->
    <g>
      <circle cx="225" cy="338" r="6" fill="#e5e9f0" stroke="#7b8394" stroke-width="1"/>
      <line x1="231" y1="338" x2="237" y2="338" stroke="#7b8394" stroke-width="1" marker-end="url(#arrow-tiny)"/>
      <rect x="240" y="330" width="34" height="16" rx="3" fill="#d8e3ee" stroke="#88a4c0" stroke-width="1"/>
      <line x1="274" y1="338" x2="278" y2="338" stroke="#7b8394" stroke-width="1" marker-end="url(#arrow-tiny)"/>
      <rect x="280" y="330" width="34" height="16" rx="3" fill="#f0e8d8" stroke="#c8b88c" stroke-width="1"/>
      <line x1="314" y1="338" x2="318" y2="338" stroke="#7b8394" stroke-width="1" marker-end="url(#arrow-tiny)"/>
      <rect x="320" y="330" width="34" height="16" rx="3" fill="#ecd9d6" stroke="#bf8e8e" stroke-width="1"/>
      <line x1="354" y1="338" x2="361" y2="338" stroke="#7b8394" stroke-width="1" marker-end="url(#arrow-tiny)"/>
      <circle cx="370" cy="338" r="6" fill="#d8e3d4" stroke="#a3be8c" stroke-width="1"/>
      <text x="395" y="342" font-size="12" fill="#2e3440">Propose, Critique, Synthesize</text>
    </g>

    <!-- Mini Council -->
    <g>
      <circle cx="225" cy="378" r="6" fill="#e5e9f0" stroke="#7b8394" stroke-width="1"/>
      <line x1="231" y1="378" x2="240" y2="378" stroke="#7b8394" stroke-width="1" marker-end="url(#arrow-tiny)"/>
      <rect x="245" y="370" width="34" height="16" rx="3" fill="#f0e8d8" stroke="#c8b88c" stroke-width="1"/>
      <line x1="279" y1="378" x2="285" y2="378" stroke="#7b8394" stroke-width="1"/>
      <circle cx="293" cy="378" r="3" fill="#d8e3ee" stroke="#88a4c0" stroke-width="0.8"/>
      <circle cx="303" cy="378" r="3" fill="#ecd9d6" stroke="#bf8e8e" stroke-width="0.8"/>
      <circle cx="313" cy="378" r="3" fill="#d8e3ee" stroke="#88a4c0" stroke-width="0.8"/>
      <line x1="319" y1="378" x2="325" y2="378" stroke="#7b8394" stroke-width="1"/>
      <rect x="328" y="370" width="34" height="16" rx="3" fill="#ecd9d6" stroke="#bf8e8e" stroke-width="1"/>
      <line x1="362" y1="378" x2="368" y2="378" stroke="#7b8394" stroke-width="1" marker-end="url(#arrow-tiny)"/>
      <circle cx="377" cy="378" r="6" fill="#d8e3d4" stroke="#a3be8c" stroke-width="1"/>
      <text x="395" y="382" font-size="12" fill="#2e3440">Council</text>
    </g>

    <text x="440" y="408" text-anchor="middle" font-size="11" font-style="italic" fill="#4c566a">(or any other workflow)</text>
  </g>

  <line x1="680" y1="310" x2="735" y2="310" stroke="#4c566a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Judge slot -->
  <g>
    <rect x="740" y="240" width="260" height="140" rx="14" fill="#ecd9d6" stroke="#bf8e8e" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="870" y="265" text-anchor="middle" font-size="16" font-weight="600" fill="#2e3440">Judge</text>
    <text x="870" y="284" text-anchor="middle" font-size="12" fill="#4c566a">good enough yet?</text>
    <text x="870" y="316" text-anchor="middle" font-size="11" fill="#4c566a">also any workflow:</text>
    <text x="870" y="334" text-anchor="middle" font-size="11" font-style="italic" fill="#2e3440">a single model, a council,</text>
    <text x="870" y="350" text-anchor="middle" font-size="11" font-style="italic" fill="#2e3440">a draft-then-adjudicate, etc.</text>
  </g>

  <!-- Accept arrow to Answer -->
  <line x1="1000" y1="310" x2="1135" y2="310" stroke="#4c566a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1067" y="299" text-anchor="middle" font-size="12" font-style="italic" fill="#2e3440">accept</text>

  <g>
    <rect x="1140" y="280" width="140" height="60" rx="30" fill="#d8e3d4" stroke="#a3be8c" stroke-width="1.5"/>
    <text x="1210" y="316" text-anchor="middle" font-size="15" font-weight="600" fill="#2e3440">Answer</text>
  </g>

  <!-- Revise loop: from Judge top up and back to Responder top -->
  <path d="M 870 240 L 870 130 L 440 130 L 440 200" fill="none" stroke="#4c566a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="655" y="120" text-anchor="middle" font-size="12" font-style="italic" fill="#2e3440">revise (with feedback)</text>

  <g>
    <rect x="610" y="138" width="90" height="24" rx="12" fill="#fef4e6" stroke="#d4a574" stroke-width="1.2"/>
    <text x="655" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#2e3440">max N rounds</text>
  </g>

  <text x="650" y="455" text-anchor="middle" font-size="11" fill="#4c566a">at the cap, the most recent draft is returned</text>
</svg>
