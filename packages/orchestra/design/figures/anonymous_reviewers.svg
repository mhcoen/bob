      <path d="M0 0L10 3.5L0 7z" fill="#7b8394"/>
    </marker>
  </defs>

  <!-- Spine x = 418 -->

  <!-- Row 1: Input pill -->
  <rect x="378" y="25" width="80" height="30" rx="15"
