<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 1000 760" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4c566a"/>
    </marker>
    <marker id="arrow-faint" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7b8394"/>
    </marker>
    <marker id="arrow-loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4c566a"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#88a4c0"/>
    </marker>
  </defs>

  <!-- Repetition arc -->
  <path d="M 760 380 A 300 300 0 1 1 760 80" fill="none" stroke="#4c566a" stroke-width="1.5" stroke-dasharray="2,4" marker-end="url(#arrow-loop)"/>
  <text x="500" y="-30" text-anchor="middle" font-size="13" font-style="italic" fill="#4c566a">loop</text>

  <!-- McLoop label ABOVE the box -->
  <text x="500" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#2e3440">McLoop</text>

  <!-- McLoop bounding box -->
  <rect x="280" y="40" width="440" height="380" rx="16" fill="none" stroke="#88a4c0" stroke-width="2.5"/>

  <!-- Reviewer 1 -->
  <g>
    <rect x="300" y="60" width="160" height="80" rx="14" fill="#ecd9d6" stroke="#bf8e8e" stroke-width="1.5"/>
    <text x="420" y="108" text-anchor="end" font-size="20" font-weight="600" fill="#2e3440">Reviewer</text>
    <text x="420" y="116" text-anchor="start" font-size="14" font-weight="600" fill="#2e3440">1</text>
  </g>

  <text x="500" y="108" text-anchor="middle" font-size="22" font-weight="600" fill="#4c566a">…</text>

  <!-- Reviewer n -->
  <g>
    <rect x="540" y="60" width="160" height="80" rx="14" fill="#ecd9d6" stroke="#bf8e8e" stroke-width="1.5"/>
    <text x="660" y="108" text-anchor="end" font-size="20" font-weight="600" fill="#2e3440">Reviewer</text>
    <text x="660" y="116" text-anchor="start" font-size="14" font-weight="600" fill="#2e3440">n</text>
  </g>

  <!-- Architect -->
  <g>
    <rect x="400" y="200" width="200" height="80" rx="14" fill="#f0e8d8" stroke="#c8b88c" stroke-width="1.5"/>
    <text x="500" y="248" text-anchor="middle" font-size="20" font-weight="600" fill="#2e3440">Architect</text>
  </g>

  <!-- Coder 1 -->
  <g>
    <rect x="315" y="320" width="130" height="80" rx="14" fill="#d8e3ee" stroke="#88a4c0" stroke-width="1.5"/>
    <text x="405" y="368" text-anchor="end" font-size="20" font-weight="600" fill="#2e3440">Coder</text>
    <text x="405" y="376" text-anchor="start" font-size="14" font-weight="600" fill="#2e3440">1</text>
  </g>

  <text x="500" y="368" text-anchor="middle" font-size="22" font-weight="600" fill="#4c566a">…</text>

  <!-- Coder n -->
  <g>
    <rect x="555" y="320" width="130" height="80" rx="14" fill="#d8e3ee" stroke="#88a4c0" stroke-width="1.5"/>
    <text x="645" y="368" text-anchor="end" font-size="20" font-weight="600" fill="#2e3440">Coder</text>
    <text x="645" y="376" text-anchor="start" font-size="14" font-weight="600" fill="#2e3440">n</text>
  </g>

  <!-- Input pill -->
  <g>
    <rect x="60" y="200" width="120" height="80" rx="40" fill="#e5e9f0" stroke="#7b8394" stroke-width="1.5"/>
    <text x="120" y="248" text-anchor="middle" font-size="20" font-weight="600" fill="#2e3440">Input</text>
  </g>

  <!-- Duplo box: blue, horizontally aligned with Input, below it -->
  <rect x="60" y="320" width="120" height="80" rx="14" fill="none" stroke="#88a4c0" stroke-width="2.5"/>
  <text x="120" y="368" text-anchor="middle" font-size="20" font-weight="700" fill="#2e3440">Duplo</text>

  <!-- Output pill -->
  <g>
    <rect x="820" y="200" width="140" height="80" rx="40" fill="#d8e3d4" stroke="#a3be8c" stroke-width="1.5"/>
    <text x="890" y="248" text-anchor="middle" font-size="20" font-weight="600" fill="#2e3440">Output</text>
  </g>

  <!-- Worktree 1 (tree graphic) -->
  <g>
    <!-- White mask behind tree to occlude the arc -->
    <rect x="355" y="460" width="50" height="52" fill="#ffffff"/>
    <circle cx="380" cy="468" r="5" fill="#88a4c0" stroke="#4c566a" stroke-width="1"/>
    <line x1="380" y1="468" x2="362" y2="500" stroke="#4c566a" stroke-width="1.2"/>
    <line x1="380" y1="468" x2="380" y2="500" stroke="#4c566a" stroke-width="1.2"/>
    <line x1="380" y1="468" x2="398" y2="500" stroke="#4c566a" stroke-width="1.2"/>
    <circle cx="362" cy="503" r="4" fill="#d8e3ee" stroke="#4c566a" stroke-width="1"/>
    <circle cx="380" cy="503" r="4" fill="#d8e3ee" stroke="#4c566a" stroke-width="1"/>
    <circle cx="398" cy="503" r="4" fill="#d8e3ee" stroke="#4c566a" stroke-width="1"/>
    <text x="412" y="530" text-anchor="end" font-size="14" font-weight="600" fill="#2e3440">worktree</text>
    <text x="412" y="535" text-anchor="start" font-size="11" font-weight="600" fill="#2e3440">1</text>
  </g>

  <text x="500" y="500" text-anchor="middle" font-size="18" font-weight="600" fill="#4c566a">…</text>

  <!-- Worktree n (tree graphic) -->
  <g>
    <!-- White mask behind tree to occlude the arc -->
    <rect x="595" y="460" width="50" height="52" fill="#ffffff"/>
    <circle cx="620" cy="468" r="5" fill="#88a4c0" stroke="#4c566a" stroke-width="1"/>
    <line x1="620" y1="468" x2="602" y2="500" stroke="#4c566a" stroke-width="1.2"/>
    <line x1="620" y1="468" x2="620" y2="500" stroke="#4c566a" stroke-width="1.2"/>
    <line x1="620" y1="468" x2="638" y2="500" stroke="#4c566a" stroke-width="1.2"/>
    <circle cx="602" cy="503" r="4" fill="#d8e3ee" stroke="#4c566a" stroke-width="1"/>
    <circle cx="620" cy="503" r="4" fill="#d8e3ee" stroke="#4c566a" stroke-width="1"/>
    <circle cx="638" cy="503" r="4" fill="#d8e3ee" stroke="#4c566a" stroke-width="1"/>
    <text x="652" y="530" text-anchor="end" font-size="14" font-weight="600" fill="#2e3440">worktree</text>
    <text x="652" y="535" text-anchor="start" font-size="11" font-weight="600" fill="#2e3440">n</text>
  </g>

  <!-- Git node -->
  <g>
    <rect x="440" y="580" width="120" height="60" rx="12" fill="#fff4ed" stroke="#f05033" stroke-width="2"/>
    <g transform="translate(470, 610)">
      <circle cx="-10" cy="-9" r="3.5" fill="#f05033"/>
      <circle cx="10" cy="-9" r="3.5" fill="#f05033"/>
      <circle cx="0" cy="9" r="3.5" fill="#f05033"/>
      <line x1="-10" y1="-9" x2="0" y2="9" stroke="#f05033" stroke-width="2"/>
      <line x1="10" y1="-9" x2="0" y2="9" stroke="#f05033" stroke-width="2"/>
    </g>
    <text x="525" y="617" text-anchor="middle" font-size="18" font-weight="600" fill="#2e3440">Git</text>
  </g>

  <!-- Input → Architect -->
  <line x1="180" y1="240" x2="395" y2="240" stroke="#4c566a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Architect ↔ Reviewer 1 -->
  <line x1="430" y1="200" x2="400" y2="142" stroke="#4c566a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="420" y1="142" x2="450" y2="200" stroke="#7b8394" stroke-width="1.1" stroke-dasharray="4,3" marker-end="url(#arrow-faint)"/>

  <!-- Architect ↔ Reviewer n -->
  <line x1="570" y1="200" x2="600" y2="142" stroke="#4c566a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="580" y1="142" x2="550" y2="200" stroke="#7b8394" stroke-width="1.1" stroke-dasharray="4,3" marker-end="url(#arrow-faint)"/>

  <!-- Architect ↔ Coder 1 -->
  <line x1="430" y1="280" x2="400" y2="318" stroke="#4c566a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="420" y1="318" x2="450" y2="280" stroke="#7b8394" stroke-width="1.1" stroke-dasharray="4,3" marker-end="url(#arrow-faint)"/>

  <!-- Architect ↔ Coder n -->
  <line x1="570" y1="280" x2="600" y2="318" stroke="#4c566a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="580" y1="318" x2="550" y2="280" stroke="#7b8394" stroke-width="1.1" stroke-dasharray="4,3" marker-end="url(#arrow-faint)"/>

  <!-- Architect → Output -->
  <line x1="600" y1="240" x2="815" y2="240" stroke="#4c566a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Coder 1 ↔ Worktree 1 -->
  <line x1="370" y1="400" x2="370" y2="460" stroke="#4c566a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="390" y1="460" x2="390" y2="402" stroke="#7b8394" stroke-width="1.1" stroke-dasharray="4,3" marker-end="url(#arrow-faint)"/>

  <!-- Coder n ↔ Worktree n -->
  <line x1="610" y1="400" x2="610" y2="460" stroke="#4c566a" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="630" y1="460" x2="630" y2="402" stroke="#7b8394" stroke-width="1.1" stroke-dasharray="4,3" marker-end="url(#arrow-faint)"/>

  <!-- Worktree 1 → Git -->
  <line x1="395" y1="540" x2="480" y2="578" stroke="#4c566a" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Worktree n → Git -->
  <line x1="605" y1="540" x2="520" y2="578" stroke="#4c566a" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- McLoop → Duplo (dotted blue) -->
  <line x1="280" y1="360" x2="183" y2="360" stroke="#88a4c0" stroke-width="2" stroke-dasharray="3,4" marker-end="url(#arrow-blue)"/>

  <!-- Duplo → Input (dotted blue) -->
  <line x1="120" y1="320" x2="120" y2="283" stroke="#88a4c0" stroke-width="2" stroke-dasharray="3,4" marker-end="url(#arrow-blue)"/>
</svg>
