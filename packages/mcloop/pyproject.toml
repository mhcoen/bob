[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "mcloop"
version = "0.1.0"
requires-python = ">=3.11"

[tool.setuptools]
packages = ["mcloop"]
script-files = ["bin/appshot"]

[project.scripts]
mcloop = "mcloop.main:main"

[tool.ruff]
target-version = "py311"
line-length = 99
exclude = ["telegram-permission-hook.py", "pytest-of-mhcoen"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[project.optional-dependencies]
dev = [
    "ruff",
    "pytest>=8.0",
    "pytest-xdist>=3.5",
    "pytest-timeout>=2.3",
    "pytest-randomly>=3.15",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-n auto"
timeout = 60
markers = [
    "integration: marks tests as integration tests (deselect with '-m not integration')",
]
