[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "bob-tools"
version = "0.1.0"
description = "Shared bob-level infrastructure. Slice A: Plan Ledger event schema and projector."
requires-python = ">=3.12"
dependencies = [
    "jsonschema>=4.21",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
    "mypy>=1.10",
    "pytest-xdist>=3.5",
    "pytest-timeout>=2.3",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["bob_tools*"]

[tool.pytest.ini_options]
addopts = "-n auto"
timeout = 60
testpaths = ["bob_tools/ledger/tests"]

[tool.ruff]
target-version = "py312"
line-length = 88
extend-exclude = ["build", "dist", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "RUF"]

[tool.mypy]
strict = true
python_version = "3.12"
files = ["bob_tools"]
exclude = ['build/', 'dist/', '\.venv/']

[[tool.mypy.overrides]]
module = "jsonschema.*"
ignore_missing_imports = true
