[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "duplo"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "mcloop",
    "orchestra",
    "bob-tools",
    "httpx>=0.27",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
    "playwright>=1.40",
    "anthropic>=0.40",
    "pypdf>=4.0",
    "Pillow>=10.0",
    "jsonschema>=4.21",
    "pytest>=8.0",
    "pytest-xdist>=3.5",
    "pytest-timeout>=2.3",
    "pytest-randomly>=3.15",
]

[tool.setuptools]
packages = ["duplo"]

[tool.setuptools.package-data]
# DUPLO-owned, project-local Orchestra workflow assets (T-000786). These
# ship with the package so duplo can deploy them to a managed project's
# .orchestra/workflows/ directory; Orchestra resolves templates and
# schemas relative to the .orc file, so all three globs must travel together.
duplo = [
    "workflows/*.orc",
    "workflows/templates/*.md",
    "workflows/schemas/*.json",
]

[project.scripts]
duplo = "duplo.main:main"

[tool.pytest.ini_options]
addopts = "-n auto"
timeout = 60

[tool.ruff]
target-version = "py312"
line-length = 99

[tool.ruff.lint.per-file-ignores]
"duplo/main.py" = ["E402"]
# __init__.py eagerly re-exports every submodule for deterministic
# attribute-style access under pytest-xdist (see its docstring); the
# imports are intentionally "unused". Ruff >=0.12 dropped the implicit
# ignore-init-module-imports default, so the suppression is now explicit.
"duplo/__init__.py" = ["F401"]

[tool.mypy]
strict = false
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
exclude = ['build/', 'dist/', '\.venv/']

[project.optional-dependencies]
dev = [
    "pytest-cov>=4.1",
]
